apiVersion: apps/v1
kind: Deployment
metadata: { name: mevscope, labels: { app: mevscope } }
spec:
  replicas: 1
  selector: { matchLabels: { app: mevscope } }
  template:
    metadata: { labels: { app: mevscope } }
    spec:
      containers:
        - name: mevscope
          image: ghcr.io/cognis-digital/mevscope:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: mevscope }
spec:
  selector: { app: mevscope }
  ports: [{ port: 80, targetPort: 8000 }]
